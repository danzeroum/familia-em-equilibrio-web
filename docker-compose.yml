services:
  familia-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: familia-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    networks:
      - web

networks:
  web:
    external: false
